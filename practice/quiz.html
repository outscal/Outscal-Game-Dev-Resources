<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Quiz — The Outscal Resource Archive</title>
<meta name="description" content="Play a quiz from the Outscal Resource Archive." />
<link rel="icon" type="image/gif" href="../outscal.gif" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="../assets/style.css" />
<style>
  /* Match the .stage width (760px) so the right-aligned q-meta sits at the same
     x-position as the question column below it. */
  .crumb {
    max-width: 760px;
    margin: 0 auto;
    padding: 24px 32px 0;
    font-size: 13px; color: var(--muted);
    display: flex; justify-content: space-between; align-items: center;
    gap: 16px;
  }
  .crumb a { color: var(--muted); text-decoration: none; transition: color .15s ease; }
  .crumb a:hover { color: var(--ink); }

  main { padding: 12px 0 96px; }
  .stage { max-width: 760px; margin: 0 auto; padding: 0 32px; }

  /* ---------- START SCREEN ---------- */
  .start .eyebrow { margin: 32px 0 16px; }
  .start .cover {
    aspect-ratio: 16 / 9;
    background: var(--paper-tint) center/cover no-repeat;
    border: 1px solid var(--rule);
    border-radius: 14px;
    margin-bottom: 32px;
  }
  .start h1 {
    font-family: var(--serif);
    font-size: clamp(36px, 5.5vw, 56px);
    line-height: 1.02; letter-spacing: -0.025em;
    margin: 0 0 16px; font-weight: 700;
  }
  .start .desc {
    font-size: 17px; color: var(--ink-soft);
    margin: 0 0 32px; max-width: 60ch;
  }
  .start .stats {
    display: flex; gap: 32px; flex-wrap: wrap;
    padding: 20px 0;
    border-top: 1px solid var(--rule);
    border-bottom: 1px solid var(--rule);
    font-size: 12px; color: var(--muted);
    text-transform: uppercase; letter-spacing: .12em;
    font-family: var(--serif); font-weight: 500;
  }
  .start .stats div { display: flex; flex-direction: column; gap: 4px; }
  .start .stats strong {
    color: var(--ink); font-family: var(--serif);
    font-size: 22px; font-weight: 700;
    text-transform: none; letter-spacing: -0.01em;
  }
  .btn-primary {
    display: inline-flex; align-items: center; gap: 10px;
    padding: 16px 28px;
    background: var(--ink); color: var(--paper);
    font-size: 15px; font-weight: 600;
    border-radius: 999px;
    /* Match btn-secondary's 1px border so both buttons render the same outer height. */
    border: 1px solid var(--ink);
    cursor: pointer;
    transition: background .15s ease, transform .15s ease, border-color .15s ease;
  }
  /* Start-screen button needs breathing room below the stats row. */
  .start .btn-primary { margin-top: 32px; }
  .btn-primary:hover { background: #222; border-color: #222; transform: translateY(-1px); }
  .btn-primary .arrow { transition: transform .15s ease; display: inline-block; }
  .btn-primary:hover .arrow { transform: translateX(3px); }

  /* ---------- QUESTION SCREEN ---------- */
  /* Lives inside the masthead, flush at its bottom edge — no floating gap. */
  .progress-track {
    height: 3px;
    background: var(--rule);
    margin-top: -1px;           /* sits on top of the masthead's border-bottom */
  }
  .progress-track[hidden] { display: none; }
  .progress-fill {
    height: 100%;
    background: var(--ink);
    transition: width .35s ease;
    width: 0%;
  }

  /* ---------- ANIMATIONS ---------- */
  @keyframes fadeSlideRight {
    from { opacity: 0; transform: translateX(-18px); }
    to   { opacity: 1; transform: translateX(0); }
  }
  @keyframes pulseTap {
    0%   { transform: scale(1); }
    40%  { transform: scale(1.015); }
    100% { transform: scale(1); }
  }
  .q-anim {
    animation: fadeSlideRight .32s ease-out;
  }
  .option.picked {
    animation: pulseTap .28s ease-out;
  }

  /* Lives inside the crumb row, so no vertical margin — inline with "← All quizzes". */
  .q-meta {
    display: flex; align-items: center; gap: 16px;
    font-family: var(--serif);
    font-size: 12px; letter-spacing: .12em;
    text-transform: uppercase; color: var(--muted);
    font-weight: 500;
  }
  /* [hidden] would normally do display:none, but .q-meta's display:flex wins.
     Explicit override so "Question N of N" actually disappears on the done screen. */
  .q-meta[hidden] { display: none; }
  .q-meta .diff {
    display: inline-flex; align-items: center; gap: 6px;
  }
  .q-meta .diff .dot {
    display: inline-block; width: 6px; height: 6px; border-radius: 50%;
    background: var(--rule);
  }
  .q-meta .diff.easy .dot   { background: #2D8A4C; }
  .q-meta .diff.medium .dot { background: var(--yellow); }
  .q-meta .diff.hard .dot   { background: #D94343; }

  .q-text {
    font-family: var(--serif);
    font-size: clamp(26px, 3.5vw, 36px);
    line-height: 1.2; letter-spacing: -0.02em;
    font-weight: 700;
    margin: 0 0 32px;
  }

  .options { display: grid; gap: 12px; }
  .option {
    text-align: left; width: 100%;
    padding: 18px 22px;
    border: 1px solid var(--rule);
    border-radius: 12px;
    background: var(--paper);
    font-size: 15px; line-height: 1.5;
    color: var(--ink);
    cursor: pointer;
    transition: background .15s ease, border-color .15s ease;
    display: flex; align-items: flex-start; gap: 14px;
  }
  .option:hover { border-color: var(--ink); background: var(--paper-tint); }
  .option .letter {
    font-family: var(--serif);
    font-weight: 600; color: var(--muted);
    min-width: 22px;
    padding-top: 1px;
  }
  .option.correct {
    border-color: #2D8A4C;
    background: #E8F5EC;
  }
  .option.correct .letter { color: #2D8A4C; }
  .option.wrong {
    border-color: #D94343;
    background: #FAE8E8;
  }
  .option.wrong .letter { color: #D94343; }
  .option:disabled { cursor: default; }
  .option:disabled:hover { background: var(--paper); border-color: var(--rule); }
  .option.correct:disabled:hover { background: #E8F5EC; border-color: #2D8A4C; }
  .option.wrong:disabled:hover { background: #FAE8E8; border-color: #D94343; }

  .reveal-note {
    margin-top: 20px;
    padding: 14px 18px;
    border-left: 3px solid var(--yellow);
    background: var(--paper-tint);
    border-radius: 0 10px 10px 0;
    font-size: 14px;
    color: var(--ink-soft);
  }
  .reveal-note strong { color: var(--ink); }
  /* Stay in place; reveal left-to-right by unclipping the right edge. */
  @keyframes wipeRight {
    from { clip-path: inset(0 100% 0 0); }
    to   { clip-path: inset(0 0 0 0); }
  }
  .reveal-note:not(.hidden) { animation: wipeRight .25s ease-out; }

  .q-nav { margin-top: 32px; display: flex; justify-content: flex-end; }

  /* ---------- DONE SCREEN ---------- */
  .done .eyebrow { margin: 32px 0 16px; }
  .done h1 {
    font-family: var(--serif);
    font-size: clamp(40px, 6vw, 64px);
    line-height: 1.02; letter-spacing: -0.03em;
    margin: 0 0 16px; font-weight: 700;
  }
  .done .score {
    display: flex; align-items: baseline; gap: 14px;
    padding: 32px 0;
    border-top: 1px solid var(--rule);
    border-bottom: 1px solid var(--rule);
    margin: 32px 0;
  }
  .done .score .num {
    font-family: var(--serif);
    font-size: 88px; font-weight: 700;
    letter-spacing: -0.03em; line-height: 1;
  }
  .done .score .total {
    font-family: var(--serif);
    font-size: 28px; color: var(--muted);
    font-weight: 500;
  }
  .done .score .percent {
    margin-left: auto;
    font-family: var(--serif);
    font-size: 32px; font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--ink);
    background: var(--yellow);
    padding: 4px 14px; border-radius: 999px;
  }
  .done p { color: var(--ink-soft); font-size: 17px; margin: 0 0 24px; max-width: 60ch; }
  .done .actions { display: flex; gap: 12px; flex-wrap: wrap; }
  /* Match btn-primary's dimensions so "Try again" and "All quizzes" look like siblings. */
  .btn-secondary {
    display: inline-flex; align-items: center; gap: 10px;
    padding: 16px 28px;
    border: 1px solid var(--rule); border-radius: 999px;
    background: var(--paper); color: var(--ink);
    font-size: 15px; font-weight: 600;
    cursor: pointer; text-decoration: none;
    transition: border-color .15s ease, background .15s ease, transform .15s ease;
  }
  .btn-secondary:hover { border-color: var(--ink); background: var(--paper-tint); transform: translateY(-1px); }

  /* ---------- ERROR ---------- */
  .error { padding: 80px 0; text-align: center; color: var(--muted); }
  .error strong { color: var(--ink); }

  .hidden { display: none !important; }
</style>
</head>

<main>
  <div class="stage">

    <section id="start" class="start hidden">
      <div class="cover" id="start-cover"></div>
      <h1 id="start-name"></h1>
      <p class="desc" id="start-desc"></p>
      <div class="stats">
        <div>Questions<strong id="start-count"></strong></div>
        <div>Difficulty<strong id="start-diff"></strong></div>
        <div>Avg. time<strong id="start-time"></strong></div>
      </div>
      <button class="btn-primary" id="start-btn">
        <span id="start-btn-label">Start quiz</span>
        <span class="arrow">→</span>
      </button>
    </section>

    <section id="question" class="question hidden">
      <h2 class="q-text" id="q-text"></h2>
      <div class="options" id="q-options"></div>
      <div class="reveal-note hidden" id="q-note"></div>
      <div class="q-nav">
        <button class="btn-primary hidden" id="q-next">
          <span id="q-next-label">Next question</span>
          <span class="arrow">→</span>
        </button>
      </div>
    </section>

    <section id="done" class="done hidden">
      <h1 id="done-title">Well played.</h1>
      <div class="score">
        <span class="num" id="done-score">0</span>
        <span class="total" id="done-total">/ 0</span>
        <span class="percent" id="done-percent">0%</span>
      </div>
      <p id="done-msg"></p>
      <div class="actions">
        <button class="btn-primary" id="done-retry">
          Try again <span class="arrow">↻</span>
        </button>
        <a class="btn-secondary" href="index.html">← All quizzes</a>
      </div>
    </section>

    <section id="err" class="error hidden">
      <p><strong>Quiz not found.</strong></p>
      <p>The slug in the URL doesn't match any quiz.</p>
      <p><a href="index.html" style="color:var(--blue)">← Back to all quizzes</a></p>
    </section>

  </div>
</main>

 this:\n\n`Enemy[] allEnemies = FindObjectsOfType<Enemy>();`\n\nHowever, enemies spawn dynamically during the game, and your radar system only checks once at the start.\n\nWhat is the best potential fix to ensure your radar system consistently tracks newly spawned enemies?","type":"SINGLE-SELECT","maxChoices":1,"difficultyLevel":"MEDIUM","options":[{"text":"Call FindObjectsOfType<Enemy>() in Update() for real-time detection.","score":0},{"text":"Keep a static list in the Enemy class that registers/unregisters each Enemy in OnEnable()/OnDisable(), and have the radar read from that list.","score":10},{"text":"Use GameObject.FindGameObjectsWithTag(\"Enemy\") and tag all enemies accordingly, calling it whenever needed.","score":0},{"text":"Store a reference to the first Enemy found and assume all enemies can be accessed via GetComponentInChildren<Enemy>() on that reference.","score":0}],"createdAt":"2025-02-02T07:17:58.861Z","updatedAt":"2025-02-02T07:18:00.424Z","publishedAt":"2025-02-02T07:18:00.409Z"},{"question":"In a “Mario Kart” - style racer, you have a UI script that displays each racer’s position. \n\nIt references the `RacerController` for Player 1 and Player 2 via the Inspector. After a race restarts, the UI script’s references to both racers become `null`.\n\nWhich of the following scenarios best explains why these references might become `null`?","type":"SINGLE-SELECT","maxChoices":1,"difficultyLevel":"MEDIUM","options":[{"text":"The restart spawns new Racer objects, and the old references in the UI script are now pointing to destroyed objects.","score":10},{"text":"Unity automatically clears all script references when any GameObject in the scene is renamed, so the race restart triggers a rename event that resets those references.","score":0},{"text":"The UI script is on a different layer than the racers, causing all cross-layer references to default to null after the scene reloads.","score":0},{"text":"References to script components cannot persist for more than 60 seconds of gameplay unless they’re periodically refreshed in Update().","score":0}],"createdAt":"2025-02-02T07:19:37.532Z","updatedAt":"2025-02-02T07:19:47.959Z","publishedAt":"2025-02-02T07:19:47.954Z"},{"question":"You’re recreating a simplified **Among Us** system in Unity. \n\nEach “Task” station has a `TaskStation` script. Crewmates have a `TaskManager` component listing all tasks they need to complete.\n\nWhich statement is *the best practice* for referencing all `TaskStation` in the scene?","type":"SINGLE-SELECT","maxChoices":1,"difficultyLevel":"MEDIUM","options":[{"text":"For tasks that never change or move, you can simply drag each TaskStation into the TaskManager Inspector fields on a game controller object.","score":0},{"text":"Use FindObjectsOfType<TaskStation>() in Start(), once per scene, if tasks are finite and pre-placed.","score":0},{"text":"Dynamically spawned tasks should register themselves to the TaskManager in OnEnable().","score":10},{"text":"If multiple scenes contain tasks, always rely on FindWithTag(\"Task\") each time you switch scenes to ensure references are fresh.","score":0}],"createdAt":"2025-02-02T07:21:21.939Z","updatedAt":"2025-02-02T07:21:23.329Z","publishedAt":"2025-02-02T07:21:23.323Z"},{"question":"You’re creating a “**League of Legends**” style game where your HUD has many nested child objects for different bars and counters (health, mana, special meters, etc.).\n\nYou have a `UIController` script on the top-level “HUD” object, and a nested “Health Bar” child with a `HealthBarController` script. When you do:\n\n`var healthBarController = GetComponent<HealthBarController>();`\n\nfrom within `UIController`, it returns `null`.\n\nIn which situation would `GetComponentInChildren<HealthBarController>()` be a better fit than `GetComponent<HealthBarController>()` here?","type":"SINGLE-SELECT","maxChoices":1,"difficultyLevel":"MEDIUM","options":[{"text":"When HealthBarController exists only on a child object and not on the same GameObject as UIController.","score":10},{"text":"When the child object is inactive, and you need to find it anyway.","score":0},{"text":"When you want to find multiple HealthBarController components across various child objects in the “HUD.”","score":0},{"text":"When you’re looking for any HealthBarController in the entire scene, not just the children of the “HUD.”","score":0}],"createdAt":"2025-02-02T07:22:38.216Z","updatedAt":"2025-02-02T07:22:47.452Z","publishedAt":"2025-02-02T07:22:47.444Z"},{"question":"You’re making a “Monster Hunter” like game, where you have a base `Weapon` class. \n\nYou have a `MeleeWeapon` subclass, and a final subclass called `GreatSword`. \n\nYou have a  “Weapon” game object that has a `GreatSword` script attached.\n\nIn your “Weapon” Game Object, you write:  \n\n`MeleeWeapon weapon = GetComponent<MeleeWeapon>();` \n\nBut it returns `null` during runtime.\n\nWhich reasons might explain why `GetComponent<MeleeWeapon>()` doesn’t return the `GreatSword` component?","type":"SINGLE-SELECT","maxChoices":1,"difficultyLevel":"MEDIUM","options":[{"text":"The script name includes the word “Sword,” which Unity doesn’t allow for GetComponent to detect.","score":0},{"text":"The GreatSword script is on a child GameObject rather than the same GameObject where GetComponent<MeleeWeapon>() is called.","score":10},{"text":"GreatSword is marked as an abstract class and can’t be instantiated (thus GreatSword script might not actually exist on that object).","score":0},{"text":"The script execution order for GreatSword is after MeleeWeapon, causing the component to be null until everything is fully loaded.","score":0}],"createdAt":"2025-02-02T07:23:18.010Z","updatedAt":"2025-02-02T07:24:17.931Z","publishedAt":"2025-02-02T07:24:17.923Z"},{"question":"You’re implementing a Zelda-style dungeon puzzle. \n\nA puzzle room has multiple triggers (pressure plates), each with a `PuzzleTrigger` script. \n\nThe central `PuzzleManager` must detect when all triggers are active to open the door.\n\nHow will you search for references of these `PuzzleTrigger` scripts in `PuzzleManager?`","type":"SINGLE-SELECT","maxChoices":1,"difficultyLevel":"MEDIUM","options":[{"text":"Add every PuzzleTrigger reference to the PuzzleManager in the Inspector, assuming they never change.","score":0},{"text":"Use a static list in each PuzzleTrigger that registers in OnEnable() and unregisters in OnDisable(), so PuzzleManager can read the updated list anytime.","score":10},{"text":"Call FindObjectsOfType<PuzzleTrigger>()  in Update() to discover new triggers as soon as they spawn.","score":0},{"text":"Place PuzzleManager on the same GameObject as one trigger and rely on GetComponent<PuzzleTrigger>() to manage them all.","score":0}],"createdAt":"2025-02-02T07:25:42.747Z","updatedAt":"2025-02-02T07:25:44.619Z","publishedAt":"2025-02-02T07:25:44.611Z"},{"question":"You’re building a hero-based shooter like Overwatch. \n\nEach hero has an `AbilityManager` responsible for various abilities (Dash, Shield, Heal, etc.).\n\nSometimes, during gameplay, the hero’s script can’t find its `AbilityManager` reference and throws `NullReferenceException` errors.\n\nWhich single solution is most likely to resolve these null reference errors in a typical setup?","type":"SINGLE-SELECT","maxChoices":1,"difficultyLevel":"MEDIUM","options":[{"text":"Store AbilityManager in a static variable so it can be accessed from any script without needing a reference.","score":0},{"text":"Use GetComponent<AbilityManager> in Start() on the same GameObject that holds both the hero script and AbilityManager.","score":10},{"text":"Continuously call FindObjectsOfType<AbilityManager>() every frame to ensure the reference updates in real-time.","score":0},{"text":"Pass a new AbilityManager instance to every hero script in the scene using a custom constructor.","score":0}],"createdAt":"2025-02-02T07:27:00.619Z","updatedAt":"2025-02-02T07:27:03.867Z","publishedAt":"2025-02-02T07:27:03.861Z"},{"question":"You’re working on a Fortnite-like building feature. \n\nPlayers can place walls, ramps, and floors at runtime. Each build piece (like a Wall) has a `Buildable` component. \n\nYour `BuildManager` needs to keep track of these build pieces to, for example, manage health or limit how many can be built.\n\nWhich strategies could effectively help the `BuildManager` track all newly spawned buildables without excessive performance overhead?","type":"SINGLE-SELECT","maxChoices":1,"difficultyLevel":"MEDIUM","options":[{"text":"Event-Driven Registration: Each new Buildable calls BuildManager.Register(this) in its OnEnable() method.","score":10},{"text":"Frequent Scene Searches: Call FindObjectsOfType<Buildable>() every few frames to rebuild the list of all existing build pieces.","score":0},{"text":"Singleton Access: Make BuildManager a singleton and let each Buildable itself do BuildManager.Instance.Register(this) upon spawn.","score":0},{"text":"Manual Assignment: Pause the game in the Inspector and manually link each new build piece to the BuildManager reference field.","score":0}],"createdAt":"2025-02-02T07:28:23.485Z","updatedAt":"2025-02-02T07:28:24.538Z","publishedAt":"2025-02-02T07:28:24.532Z"},{"question":"You’re designing a Skyrim-like NPC dialogue system. \n\nAs the player approaches an NPC, your `DialogueManager` must locate the NPC’s `DialogueController` to start a conversation. During playtesting, some NPCs fail to trigger dialogue, indicating that the `DialogueController` reference might be missing.\n\nWhich is the most plausible explanation for why certain NPCs do not trigger dialogue?","type":"SINGLE-SELECT","maxChoices":1,"difficultyLevel":"MEDIUM","options":[{"text":"The collision is happening on an NPC’s child object, which doesn’t have the DialogueController. Because the manager only checks the object that triggered the collision, it can’t find the DialogueController on the child, and the dialogue never starts.","score":10},{"text":"There are multiple cameras in the scene, so Unity cannot reliably find the correct DialogueController.","score":0},{"text":"Dialogue is only possible if the NPC’s name matches a specific string, such as “TalkToMeNPC,” which some NPCs don’t have.","score":0},{"text":"DialogueManager is set to DontDestroyOnLoad() while NPCs are not, so the manager forcibly deletes any DialogueController that doesn’t persist across scene loads.","score":0}],"createdAt":"2025-02-02T07:29:36.658Z","updatedAt":"2025-02-02T07:29:58.255Z","publishedAt":"2025-02-02T07:29:37.733Z"}],"createdAt":"2025-02-02T07:39:44.745Z","updatedAt":"2025-02-03T06:10:39.952Z","publishedAt":"2025-02-02T07:39:46.245Z"},{"name":"Unity and Unreal: Beginner","slug":"unity-unreal-beginner","description":"Test your basic knowledge of Unity and Unreal Engine with this beginner-friendly quiz on game development fundamentals.","image":"../assets/practice/unity-unreal-beginner.png","buttonText":null,"questions":[{"question":"Which Unity function is called every frame to update game logic?","type":"SINGLE-SELECT","maxChoices":1,"difficultyLevel":null,"options":[{"text":"Start()","score":0},{"text":"FixedUpdate()","score":0},{"text":"LateUpdate()","score":0},{"text":"Update()","score":10}],"createdAt":"2025-02-07T14:00:59.953Z","updatedAt":"2025-02-07T14:34:02.399Z","publishedAt":"2025-02-07T14:34:02.394Z"},{"question":"How do you reference a GameObject in a script using the Unity API?","type":"SINGLE-SELECT","maxChoices":1,"difficultyLevel":null,"options":[{"text":"GameObject.Find(\"ObjectName\")","score":10},{"text":"GetComponent<Rigidbody>()","score":0},{"text":"Instantiate(Prefab)","score":0},{"text":"Object.FindScene()","score":0}],"createdAt":"2025-02-07T14:02:34.113Z","updatedAt":"2025-02-07T14:34:16.571Z","publishedAt":"2025-02-07T14:34:16.554Z"},{"question":"Which Unity component allows a GameObject to be affected by physics?","type":"SINGLE-SELECT","maxChoices":1,"difficultyLevel":null,"options":[{"text":"MeshRenderer","sc <script>
(function () {
  const $ = (s) => document.querySelector(s);
  const esc = (s) => String(s ?? "").replace(/[&<>"']/g, (c) => (
    { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]
  ));
  const show = (id) => {
    ["start", "question", "done", "err"].forEach((x) => {
      document.getElementById(x).classList.toggle("hidden", x !== id);
    });
    // These live in the masthead / crumb row — toggle them alongside the sections.
    document.getElementById("q-meta").hidden = (id !== "question");
    document.getElementById("start-eyebrow").hidden = (id !== "start");
    document.getElementById("progress").hidden = (id !== "question");
  };

  const data = JSON.parse(document.getElementById("data").textContent);
  const slug = new URLSearchParams(location.search).get("q");
  const quiz = data.find((x) => x.slug === slug);

  if (!quiz) { show("err"); return; }

  // Difficulty summary for the start screen.
  function diffSummary(qs) {
    const c = { EASY: 0, MEDIUM: 0, HARD: 0 };
    qs.forEach((q) => { if (q.difficultyLevel && c[q.difficultyLevel] != null) c[q.difficultyLevel]++; });
    const parts = [];
    if (c.EASY)   parts.push(`${c.EASY} easy`);
    if (c.MEDIUM) parts.push(`${c.MEDIUM} medium`);
    if (c.HARD)   parts.push(`${c.HARD} hard`);
    return parts.join(" · ") || "Mixed";
  }

  // Progress bar width
  function setProgress(n, total) {
    const pct = total ? (n / total) * 100 : 0;
    $("#progress-fill").style.width = pct + "%";
  }

  // ---------- START SCREEN ----------
  document.title = `${quiz.name} — Practice — Outscal`;
  $("#start-name").textContent = quiz.name;
  $("#start-desc").textContent = quiz.description || "";
  $("#start-count").textContent = quiz.questions.length;
  $("#start-diff").textContent = diffSummary(quiz.questions);
  $("#start-time").textContent = `~${Math.max(1, Math.round(quiz.questions.length * 0.5))} min`;
  if (quiz.image) $("#start-cover").style.backgroundImage = `url("${quiz.image}")`;
  if (quiz.buttonText) $("#start-btn-label").textContent = quiz.buttonText;

  // ---------- QUIZ STATE ----------
  let idx = 0;
  let answered = false;
  const picks = new Array(quiz.questions.length).fill(null); // array of option-index arrays

  function renderQuestion() {
    const q = quiz.questions[idx];
    setProgress(idx, quiz.questions.length);
    $("#q-progress").textContent = `Question ${idx + 1} of ${quiz.questions.length}`;
    const dl = (q.difficultyLevel || "").toLowerCase();
    const diffEl = $("#q-diff");
    diffEl.className = `diff ${dl}`;
    $("#q-diff-label").textContent = q.difficultyLevel || "Any level";
    $("#q-text").textContent = q.question;

    const letters = ["A", "B", "C", "D", "E", "F"];
    $("#q-options").innerHTML = q.options.map((o, i) => `
      <button class="option" data-i="${i}">
        <span class="letter">${letters[i] || (i + 1)}</span>
        <span>${esc(o.text)}</span>
      </button>
    `).join("");

    $("#q-options").querySelectorAll(".option").forEach((btn) => {
      btn.addEventListener("click", () => pickOption(parseInt(btn.dataset.i, 10)));
    });

    $("#q-note").classList.add("hidden");
    $("#q-next").classList.add("hidden");
    answered = false;
    show("question");

    // Replay the fade-in animation on each question so transitions feel intentional.
    const qSection = $("#question");
    qSection.classList.remove("q-anim");
    void qSection.offsetWidth;            // force reflow so the animation restarts
    qSection.classList.add("q-anim");
  }

  function pickOption(i) {
    if (answered) return;
    answered = true;
    const q = quiz.questions[idx];
    picks[idx] = [i];
    const opts = $("#q-options").querySelectorAll(".option");
    opts.forEach((btn) => { btn.disabled = true; });

    // Pulse the one the user tapped.
    opts[i].classList.add("picked");

    // Mark all options: correct ones green, picked-wrong red.
    q.options.forEach((opt, j) => {
      const btn = opts[j];
      const correct = (opt.score ?? 0) > 0;
      if (correct) btn.classList.add("correct");
      if (j === i && !correct) btn.classList.add("wrong");
    });

    // Reveal note
    const pickedCorrect = (q.options[i].score ?? 0) > 0;
    const correctTexts = q.options.filter((o) => (o.score ?? 0) > 0).map((o) => o.text);
    const note = $("#q-note");
    note.innerHTML = pickedCorrect
      ? `<strong>Nice.</strong> You picked the right one.`
      : `<strong>Not quite.</strong> The answer was: ${correctTexts.map(esc).join(", ")}`;
    note.classList.remove("hidden");

    // Next button (or finish)
    const nextLabel = (idx === quiz.questions.length - 1) ? "See results" : "Next question";
    $("#q-next-label").textContent = nextLabel;
    $("#q-next").classList.remove("hidden");
  }

  $("#q-next").addEventListener("click", () => {
    if (idx < quiz.questions.length - 1) { idx++; renderQuestion(); }
    else finish();
  });

  function finish() {
    setProgress(quiz.questions.length, quiz.questions.length);
    let score = 0, max = 0;
    quiz.questions.forEach((q, i) => {
      max += Math.max(...q.options.map((o) => o.score ?? 0));
      const pick = picks[i]?.[0];
      if (pick != null) score += q.options[pick].score ?? 0;
    });
    const pct = max ? Math.round((score / max) * 100) : 0;
    $("#done-score").textContent = score;
    $("#done-total").textContent = "/ " + max;
    $("#done-percent").textContent = pct + "%";
    $("#done-title").textContent =
      pct >= 90 ? "Outstanding." :
      pct >= 70 ? "Well played." :
      pct >= 50 ? "Solid effort." :
      "Good try.";
    $("#done-msg").textContent =
      pct >= 90 ? "You've got this down. Try a harder one, or share the quiz link with someone to test them." :
      pct >= 70 ? "You know the core. A couple of gaps — worth reviewing the cheat sheets for this topic." :
      pct >= 50 ? "Half-way there. Check the corresponding breakdowns in the Library to fill in the gaps." :
                  "Plenty to learn — start with the roadmaps or a relevant cheat sheet, then come back.";
    document.title = `${pct}% — ${quiz.name} — Outscal`;
    show("done");
  }

  $("#done-retry").addEventListener("click", () => {
    idx = 0; answered = false;
    picks.fill(null);
    setProgress(0, quiz.questions.length);
    renderQuestion();
  });

  $("#start-btn").addEventListener("click", () => {
    idx = 0; answered = false;
    picks.fill(null);
    renderQuestion();
  });

  show("start");
})();
</script>
